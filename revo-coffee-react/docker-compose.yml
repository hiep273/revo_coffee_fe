services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
    networks:
      - revo-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=revo_coffee
    ports:
      - "3306:3306"
    networks:
      - revo-network
    volumes:
      - mysql_data:/var/lib/mysql

  auth-service:
    build: ./services/auth
    ports:
      - "8001:8001"
    networks:
      - revo-network

  product-service:
    build: ./services/products
    ports:
      - "8002:80"
    networks:
      - revo-network

  order-service:
    build: ./services/orders
    ports:
      - "8003:8080"
    networks:
      - revo-network

  admin-frontend:
    build: ./admin-frontend
    ports:
      - "5174:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./admin-frontend:/app
      - /app/node_modules
    networks:
      - revo-network

  frontend:
    build: .
    ports:
      - "5173:5173"
    networks:
      - revo-network

networks:
  revo-network:
    driver: bridge

volumes:
  mysql_data: